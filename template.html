<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Biodiversity Study Catalog</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="layout">
    <aside class="filters" aria-label="Filters">
      <h2>Filters</h2>

      <fieldset class="filter-group">
        <legend>Method</legend>
        <div id="f-method" class="checkbox-group" aria-label="Filter by method"></div>
      </fieldset>

      <fieldset class="filter-group">
        <legend>Condition</legend>
        <div id="f-condition" class="checkbox-group" aria-label="Filter by condition"></div>
      </fieldset>

      <fieldset class="filter-group">
        <legend>Order</legend>
        <div id="f-order" class="checkbox-group" aria-label="Filter by order"></div>
      </fieldset>

      <fieldset class="filter-group">
        <legend>Class</legend>
        <div id="f-class" class="checkbox-group" aria-label="Filter by class"></div>
      </fieldset>

      <fieldset class="filter-group">
        <legend>Tissue</legend>
        <div id="f-tissue" class="checkbox-group" aria-label="Filter by tissue"></div>
      </fieldset>

      <label>Min Individuals
        <input id="f-min-ind" type="number" min="0" placeholder="e.g. 5" aria-label="Minimum individuals" />
      </label>

      <label>Species Name
        <input id="f-species" type="text" placeholder="e.g. parus major" aria-label="Filter by species name" />
      </label>

      <button id="btn-clear">Clear filters</button>

      <hr />

      <button id="btn-download-bib">Download BibTeX of selected</button>
      <small id="sel-count" aria-live="polite"></small>
    </aside>

    <main class="content">
      <h1>Wildlife epigenomics data</h1>
      <div id="cards"></div>
    </main>
  </div>

  <!-- INJECT_DATA -->
  <script src="script.js"></script>
</body>
</html>
